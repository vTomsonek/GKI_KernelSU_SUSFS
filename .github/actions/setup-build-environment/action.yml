name: 'Setup Build Environment'
description: 'Clones dependencies and exports mkbootimg/avbtool paths'
inputs:
  patches_commit:
    required: false
  anykernel_commit:
    required: false
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$GITHUB_WORKSPACE/kernel"
        mkdir -p "$GITHUB_WORKSPACE/git-repo"
        curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
        chmod +x "$GITHUB_WORKSPACE/git-repo/repo"
        echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
        if [ -n "${{ inputs.patches_commit }}" ]; then
          if [ -d "$GITHUB_WORKSPACE/kernel_patches" ]; then rm -rf "$GITHUB_WORKSPACE/kernel_patches"; fi
          git clone https://github.com/WildKernels/kernel_patches.git "$GITHUB_WORKSPACE/kernel_patches"
          cd "$GITHUB_WORKSPACE/kernel_patches"
          git checkout "${{ inputs.patches_commit }}"
          cd "$GITHUB_WORKSPACE"
        else
          git clone https://github.com/WildKernels/kernel_patches.git "$GITHUB_WORKSPACE/kernel_patches"
        fi
        if [ -n "${{ inputs.anykernel_commit }}" ]; then
          if [ -d "$GITHUB_WORKSPACE/AnyKernel3" ]; then rm -rf "$GITHUB_WORKSPACE/AnyKernel3"; fi
          git clone https://github.com/WildKernels/AnyKernel3.git "$GITHUB_WORKSPACE/AnyKernel3"
          cd "$GITHUB_WORKSPACE/AnyKernel3"
          git checkout "${{ inputs.anykernel_commit }}"
          cd "$GITHUB_WORKSPACE"
        elif [ ! -d "$GITHUB_WORKSPACE/AnyKernel3" ]; then
          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 "$GITHUB_WORKSPACE/AnyKernel3"
        fi
        AOSP_MIRROR=https://android.googlesource.com
        BRANCH=main-kernel-2025
        git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools

        # Fetch only the scripts we actually need from mkbootimg repo:
        # mkbootimg.py, unpack_bootimg.py, and gki/ subdir for GKI certificate generation
        rm -rf mkbootimg
        mkdir -p mkbootimg/gki
        MKBOOTIMG_BASE="https://android.googlesource.com/platform/system/tools/mkbootimg/+/refs/heads/main"
        MKBOOTIMG_FALLBACK="https://raw.githubusercontent.com/LineageOS/android_system_tools_mkbootimg/lineage-22.0"

        fetch_file() {
          local rel_path="$1"
          local out_path="mkbootimg/$rel_path"
          echo "Fetching $rel_path from googlesource..."
          if curl -fsSL "${MKBOOTIMG_BASE}/${rel_path}?format=TEXT" | base64 -d > "$out_path" \
             && [ -s "$out_path" ] \
             && head -1 "$out_path" | grep -qE '^#!.*python|^#|^"""|^from |^import '; then
            echo "  -> ok (googlesource)"
            return 0
          fi
          echo "  googlesource failed, trying LineageOS mirror..."
          curl -fsSL "${MKBOOTIMG_FALLBACK}/${rel_path}" -o "$out_path"
          if [ ! -s "$out_path" ] || ! head -1 "$out_path" | grep -qE '^#!.*python|^#|^"""|^from |^import '; then
            echo "ERROR: could not obtain a valid $rel_path from any source"
            head -5 "$out_path" || true
            return 1
          fi
          echo "  -> ok (LineageOS)"
        }

        fetch_file "mkbootimg.py"
        fetch_file "unpack_bootimg.py"
        # GKI certificate generation module - needed for boot image creation
        touch mkbootimg/gki/__init__.py
        fetch_file "gki/generate_gki_certificate.py"

        chmod +x mkbootimg/mkbootimg.py mkbootimg/unpack_bootimg.py
        echo "=== mkbootimg layout ==="
        ls -la mkbootimg/
        ls -la mkbootimg/gki/

        echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> "$GITHUB_ENV"
        echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> "$GITHUB_ENV"
        echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> "$GITHUB_ENV"
        echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem" >> "$GITHUB_ENV"
        mkdir -p "$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb"
        KEY_PATH="$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem"

        if [ -n "${BOOT_SIGN_KEY:-}" ]; then
          echo "Using BOOT_SIGN_KEY from secrets"
          printf '%s' "$BOOT_SIGN_KEY" > "$KEY_PATH"
          if ! head -n 1 "$KEY_PATH" | grep -q 'BEGIN'; then
            printf '%s' "$BOOT_SIGN_KEY" | base64 -d > "$KEY_PATH"
          fi
        elif [ -f "$KEY_PATH" ]; then
          echo "Using existing testkey from kernel-build-tools"
        else
          echo "BOOT_SIGN_KEY not set - downloading AOSP public test key"
          curl -fsSL "https://android.googlesource.com/platform/external/avb/+/refs/heads/main/test/data/testkey_rsa2048.pem?format=TEXT" \
            | base64 -d > "$KEY_PATH"
          if ! head -n 1 "$KEY_PATH" | grep -q 'BEGIN'; then
            echo "ERROR: failed to fetch AOSP test key"
            exit 1
          fi
        fi
        chmod 600 "$KEY_PATH"
        echo "Boot sign key configured at: $KEY_PATH"
