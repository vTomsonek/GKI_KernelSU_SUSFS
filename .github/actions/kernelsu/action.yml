name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking
inputs:
  ksu_commit:
    description: "KernelSU-Next ref/commit (optional, defaults to dev)"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Download Wild KSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        TARGET_REF="${{ inputs.ksu_commit }}"
        if [ -z "$TARGET_REF" ]; then TARGET_REF="dev"; fi
        echo "=== Requested KSU ref: $TARGET_REF ==="

        # KSU's setup.sh does a git clone + checkout. We pass our target ref directly.
        # The script accepts any ref (branch/tag/SHA) as its argument.
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s "$TARGET_REF" || {
          echo "  setup.sh failed with $TARGET_REF, retrying with dev then manual checkout..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s dev
        }

        # Verify and force checkout if needed
        cd KernelSU-Next
        # Make sure we have ALL refs (setup.sh may have done shallow clone)
        if [ -f .git/shallow ] || [ "$(git rev-parse --is-shallow-repository 2>/dev/null)" = "true" ]; then
          echo "  Repo is shallow, unshallowing..."
          git fetch --unshallow --tags --prune 2>/dev/null || git fetch --tags --prune
        fi
        git fetch --all --tags --prune 2>/dev/null || true

        # Verify we're actually on the requested ref
        CURRENT_HEAD="$(git rev-parse HEAD)"
        CURRENT_TAG="$(git describe --tags --exact-match 2>/dev/null || echo '<no exact tag>')"
        echo "=== Currently at: $CURRENT_HEAD ($CURRENT_TAG) ==="

        if [ "$TARGET_REF" != "dev" ]; then
          echo "=== Forcing checkout to $TARGET_REF ==="
          # Try in order: SHA, branch (origin/X), tag, fail loudly
          if git checkout --force "$TARGET_REF" 2>/dev/null; then
            echo "  -> checked out as ref"
          elif git checkout --force "origin/$TARGET_REF" 2>/dev/null; then
            echo "  -> checked out as origin/$TARGET_REF"
          elif git checkout --force "refs/tags/$TARGET_REF" 2>/dev/null; then
            echo "  -> checked out as tag"
          else
            echo "ERROR: could not checkout KernelSU-Next ref/commit/tag: $TARGET_REF"
            echo "Available recent tags:"
            git tag -l | tail -20
            echo "Available recent commits:"
            git log --oneline -20
            exit 1
          fi

          # Verify checkout actually succeeded by comparing HEAD
          NEW_HEAD="$(git rev-parse HEAD)"
          NEW_TAG="$(git describe --tags --exact-match 2>/dev/null || git describe --tags 2>/dev/null || echo '<none>')"
          echo "=== Now at: $NEW_HEAD ($NEW_TAG) ==="

          if [ "$NEW_HEAD" = "$CURRENT_HEAD" ] && [ "$TARGET_REF" != "$CURRENT_HEAD" ]; then
            echo "WARNING: HEAD did not change after checkout, this is suspicious"
          fi
        fi

        cd kernel

        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild

    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

        # Diagnostic
        echo "=== Final KSU state ==="
        echo "  HEAD: $(git rev-parse HEAD)"
        echo "  short: $KSU_COMMIT"
        echo "  tag: $KSU_GIT_TAG"
        echo "  version int: $KSU_VERSION"
